<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Configuración para móviles: evita que la pantalla haga zoom accidental al tocar botones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Color del tema: Cambia el color de la barra superior del navegador en móviles (Combina con tu header oscuro) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Título de la pestaña -->
    <title>Mis Finanzas | Control de Sueldo y Gastos</title>

    <!-- Meta Tags Básicos para SEO (Buscadores como Google) -->
    <meta name="description" content="Lleva el control exacto de tu sueldo, adelantos, gastos e ingresos extra. Calcula tus ganancias por día, hora y minuto en tiempo real." />
    <meta name="keywords" content="finanzas personales, control de gastos, sueldo, adelantos, ingresos extra, perú, app financiera, ahorros" />
    <meta name="author" content="Mi App de Finanzas" />

    <!-- Open Graph (OG) / Redes Sociales (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mis Finanzas | Control de Sueldo y Gastos" />
    <meta property="og:description" content="Gestiona tu dinero de forma inteligente. Registra tus ingresos, propinas y gastos al instante." />
    <!-- Imagen que aparecerá como vista previa al enviar el link (puedes cambiar esta URL por una imagen tuya) -->
    <meta property="og:image" content="https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" />
    <meta property="og:url" content="https://tu-enlace-de-vercel.vercel.app/" />

    <!-- Twitter Cards (Para compartir en Twitter/X) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mis Finanzas | Control Inteligente" />
    <meta name="twitter:description" content="Gestiona tu dinero de forma inteligente. Registra tus ingresos y gastos al instante." />

    <!-- Favicon (Ícono de la pestaña). Por ahora he puesto un emoji de billete volar 💸 que funcionará al instante -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>" />
    
    <!-- Apple Touch Icon (El ícono que aparecerá en tu teléfono cuando le des a "Añadir a la pantalla de inicio") -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
